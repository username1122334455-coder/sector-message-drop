<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rewards Redemption</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f1e8;
        --panel: #fffdf8;
        --line: #d8c9a6;
        --line-strong: #9a7a36;
        --text: #172033;
        --muted: #6f6658;
        --accent: #2d405f;
        --gold: #9a7a36;
        --error: #9f3d32;
        --success: #2f6b4f;
        font-family: "IBM Plex Mono", monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: clamp(18px, 5vw, 46px);
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(245, 241, 232, 0.96)),
          var(--bg);
      }

      main {
        width: min(100%, 620px);
        margin: 10vh auto 0;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: clamp(18px, 4vw, 28px);
        background: var(--panel);
        box-shadow: 0 18px 44px rgba(23, 32, 51, 0.08);
      }

      h1,
      p {
        margin: 0;
      }

      h1,
      button {
        font-family: "Cinzel", "IBM Plex Mono", serif;
      }

      h1 {
        color: var(--accent);
        font-size: clamp(2.1rem, 8vw, 4rem);
        line-height: 0.95;
        text-transform: uppercase;
      }

      .eyebrow {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .copy {
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.65;
      }

      form {
        display: grid;
        gap: 14px;
        margin-top: 24px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 0.78rem;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 3px;
        outline: none;
        padding: 11px 12px;
        background: #ffffff;
        color: var(--text);
        font: inherit;
      }

      input:focus {
        border-color: var(--line-strong);
      }

      button {
        min-height: 46px;
        border: 1px solid var(--line-strong);
        border-radius: 3px;
        padding: 10px 14px;
        background: #eadfbf;
        color: var(--text);
        cursor: pointer;
        font-size: 1rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .status {
        min-height: 22px;
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.55;
        text-transform: uppercase;
      }

      .status.is-error {
        color: var(--error);
      }

      .status.is-success {
        color: var(--success);
      }

      .receipt {
        display: none;
        gap: 10px;
        margin-top: 16px;
      }

      .receipt.is-visible {
        display: grid;
      }

      code {
        display: block;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 3px;
        padding: 10px 12px;
        background: #ffffff;
        color: var(--accent);
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-label="Rewards redemption">
        <p class="eyebrow">private rewards portal</p>
        <h1>Rewards Redemption</h1>
        <p class="copy">
          Enter the individual user number and assigned primary or backup reward code.
          Codes are verified against the secure redemption register before review opens.
        </p>

        <form id="redeemForm">
          <label>
            Individual user number
            <input id="userNumber" autocomplete="off" inputmode="numeric" spellcheck="false" placeholder="1001" required />
          </label>
          <label>
            Reward code
            <input id="rewardCode" autocomplete="off" inputmode="numeric" spellcheck="false" placeholder="8-16 digit code" required />
          </label>
          <button id="redeemButton" type="submit">Verify Code</button>
        </form>

        <p class="status" id="status">Awaiting code.</p>

        <div class="receipt" id="receipt">
          <code id="receiptUser">User pending</code>
          <code id="receiptCode">Code pending</code>
          <code id="receiptStatus">Status pending</code>
          <code id="receiptId">Redemption pending</code>
          <code id="receiptTime">Time pending</code>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://hrsrjfpygekjyuwibsia.supabase.co";
      const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_Sl962RuGBx2L5aWFmeeCUQ_t-p0YEHW";
      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

      const form = document.querySelector("#redeemForm");
      const userNumberInput = document.querySelector("#userNumber");
      const rewardCodeInput = document.querySelector("#rewardCode");
      const redeemButton = document.querySelector("#redeemButton");
      const status = document.querySelector("#status");
      const receipt = document.querySelector("#receipt");
      const receiptUser = document.querySelector("#receiptUser");
      const receiptCode = document.querySelector("#receiptCode");
      const receiptStatus = document.querySelector("#receiptStatus");
      const receiptId = document.querySelector("#receiptId");
      const receiptTime = document.querySelector("#receiptTime");
      const clientIdKey = "reward-redemption-client-id";

      const userNumberPattern = /^\d{1,10}$/;
      const rewardCodePattern = /^\d{8,16}$/;

      const getClientId = () => {
        let clientId = localStorage.getItem(clientIdKey);
        if (!clientId) {
          clientId = crypto.randomUUID();
          localStorage.setItem(clientIdKey, clientId);
        }
        return clientId;
      };

      const setStatus = (message, type = "") => {
        status.textContent = message;
        status.className = type ? `status ${type}` : "status";
      };

      const formatTime = (date) =>
        new Intl.DateTimeFormat("en-US", {
          dateStyle: "medium",
          timeStyle: "medium",
        }).format(date);

      const maskCode = (code) => `${"*".repeat(Math.max(code.length - 4, 4))}${code.slice(-4)}`;

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const userNumber = userNumberInput.value.trim();
        const rewardCode = rewardCodeInput.value.trim();

        if (!userNumberPattern.test(userNumber)) {
          receipt.classList.remove("is-visible");
          setStatus("Invalid user number. Use digits only.", "is-error");
          return;
        }

        if (!rewardCodePattern.test(rewardCode)) {
          receipt.classList.remove("is-visible");
          setStatus("Invalid reward code. Use 8 to 16 digits.", "is-error");
          return;
        }

        redeemButton.disabled = true;
        setStatus("Verifying reward code...");

        try {
          const { data, error } = await client.rpc("verify_reward_code", {
            p_user_number: userNumber,
            p_reward_code: rewardCode,
            p_client_id: getClientId(),
          });

          if (error) throw error;

          if (!data?.ok) {
            receipt.classList.remove("is-visible");
            setStatus(data?.message || "Invalid reward credentials.", "is-error");
            return;
          }

          const verifiedAt = data.verified_at ? new Date(data.verified_at) : new Date();
          receiptUser.textContent = `User number: ${data.user_number || userNumber}`;
          receiptCode.textContent = `Reward code: ${maskCode(rewardCode)}`;
          receiptStatus.textContent = `Status: verified with ${data.verified_with || "approved"} code`;
          receiptId.textContent = `Redemption ID: ${data.redemption_id || "pending"}`;
          receiptTime.textContent = `Verified: ${formatTime(verifiedAt)}`;
          receipt.classList.add("is-visible");
          setStatus("Reward code verified. Redemption review opened.", "is-success");
        } catch (error) {
          console.error("Reward verification failed:", error);
          receipt.classList.remove("is-visible");
          setStatus("Verification unavailable. Confirm Supabase reward SQL is installed.", "is-error");
        } finally {
          redeemButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
