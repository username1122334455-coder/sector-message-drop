<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sector Message Drop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand+SC&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #100713;
        --panel: #24101b;
        --panel-2: #2c1420;
        --text: #fff1df;
        --muted: #d9a68a;
        --accent: #ff8a3d;
        --accent-2: #ffd166;
        --danger: #ff5d73;
        --ink: #281007;
        font-family: "Patrick Hand SC", "Trebuchet MS", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: clamp(14px, 4vw, 34px);
        overflow-x: hidden;
        color: var(--text);
        background-color: var(--bg);
        background-image: radial-gradient(rgba(255, 255, 255, 0.38) 1px, transparent 1px);
        background-size: 18px 18px;
      }

      body::before,
      body::after {
        display: none;
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        content: "";
      }

      body::before {
        background:
          radial-gradient(circle at center, rgba(255, 138, 61, 0.12) 0 1px, transparent 1px),
          linear-gradient(rgba(255, 138, 61, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 138, 61, 0.045) 1px, transparent 1px);
        background-size: 18px 18px, 42px 42px, 42px 42px;
        opacity: 0.36;
      }

      body::after {
        z-index: 4;
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.035) 0,
          rgba(255, 255, 255, 0.035) 1px,
          transparent 1px,
          transparent 5px
        );
        mix-blend-mode: screen;
        opacity: 0.28;
        animation: flicker 5s infinite steps(1);
      }

      .console {
        position: relative;
        width: min(100%, 760px);
        padding: clamp(16px, 4vw, 28px);
        border: 0;
        border-radius: 8px;
        overflow: hidden;
        background:
          linear-gradient(145deg, rgba(68, 28, 38, 0.88), rgba(18, 7, 18, 0.94)),
          var(--panel);
        backdrop-filter: blur(4px) saturate(1.15);
        box-shadow:
          0 0 36px rgba(255, 138, 61, 0.28),
          inset 0 0 42px rgba(255, 138, 61, 0.08);
        transform: perspective(900px) rotateX(var(--tilt-y, 0deg)) rotateY(var(--tilt-x, 0deg));
        transition: transform 220ms ease, box-shadow 220ms ease;
      }

      .console::before {
        display: block;
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          repeating-linear-gradient(180deg, rgba(255, 209, 102, 0.035) 0 1px, transparent 1px 5px),
          radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 138, 61, 0.12), transparent 36%);
        opacity: 0.42;
        content: "";
      }

      .console::after {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          radial-gradient(rgba(255, 209, 102, 0.06) 1px, transparent 1px),
          radial-gradient(rgba(255, 138, 61, 0.04) 1px, transparent 1px);
        background-position: 0 0, 7px 9px;
        background-size: 13px 11px, 17px 19px;
        mix-blend-mode: screen;
        opacity: 0.18;
        content: "";
        animation: grainDrift 6s steps(3) infinite;
      }

      .console > * {
        position: relative;
        z-index: 1;
      }

      .topbar {
        position: relative;
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: clamp(18px, 4vw, 28px);
      }

      .brand {
        min-width: 0;
      }

      .kicker {
        margin: 0 0 4px;
        color: var(--accent-2);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.78rem;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--text);
        font-family: "Bangers", "Arial Black", Impact, sans-serif;
        font-size: clamp(2.25rem, 10vw, 5rem);
        font-weight: 400;
        letter-spacing: 0;
        line-height: 0.88;
        text-shadow: 4px 4px 0 #351220, 0 0 18px rgba(255, 138, 61, 0.36);
      }

      .status-stack {
        display: grid;
        gap: 8px;
        flex: 0 0 auto;
        min-width: 138px;
      }

      .status-pill {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 7px 10px;
        border: 1px solid rgba(255, 138, 61, 0.5);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.36);
        color: var(--accent);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.72rem;
        text-transform: uppercase;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent);
        animation: pulse 1.35s infinite;
      }

      .mission-grid {
        position: relative;
        display: grid;
        grid-template-columns: 1fr;
        gap: clamp(16px, 4vw, 26px);
        align-items: stretch;
      }

      .radar {
        display: none;
      }

      .radar::before {
        position: absolute;
        inset: 50% auto auto 50%;
        width: 170%;
        height: 170%;
        background: conic-gradient(from 0deg, rgba(255, 138, 61, 0.45), transparent 28%);
        transform-origin: 0 0;
        content: "";
        animation: sweep 4.5s linear infinite;
      }

      .radar::after {
        position: absolute;
        inset: 18px;
        border: 1px solid rgba(255, 209, 102, 0.34);
        border-radius: 50%;
        content: "";
        box-shadow: inset 0 0 26px rgba(255, 138, 61, 0.16);
      }

      .blip {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 14px var(--accent-2);
        animation: pulse 1.6s infinite;
      }

      .blip.one {
        top: 31%;
        left: 65%;
      }

      .blip.two {
        top: 66%;
        left: 38%;
        animation-delay: 0.45s;
      }

      .radar-label {
        position: absolute;
        left: 16px;
        bottom: 14px;
        margin: 0;
        color: var(--accent);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.74rem;
        text-transform: uppercase;
      }

      .panel {
        position: relative;
        display: grid;
        align-content: center;
        gap: 14px;
        padding: clamp(16px, 4vw, 26px);
        border: 0;
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(58, 22, 31, 0.84), rgba(16, 6, 16, 0.82)),
          var(--panel-2);
        transition: box-shadow 180ms ease, border-color 180ms ease;
      }

      .panel.is-active {
        box-shadow:
          0 0 32px rgba(255, 92, 61, 0.18),
          inset 0 0 32px rgba(255, 138, 61, 0.12);
      }

      .panel.is-sending {
        animation: transmitPulse 1s ease;
      }

      .clock-chip {
        justify-self: end;
        padding: 6px 9px;
        border: 1px solid rgba(255, 209, 102, 0.34);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.26);
        color: var(--accent-2);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.78rem;
        line-height: 1;
        text-transform: uppercase;
        box-shadow: inset 0 0 12px rgba(255, 138, 61, 0.08);
      }

      .terminal-head {
        display: grid;
        justify-items: end;
      }

      .stats-row span,
      .terminal-log {
        transition: opacity 180ms ease, transform 180ms ease, text-shadow 180ms ease;
      }

      .panel-title {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .panel-title p {
        margin: 0;
        color: var(--muted);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.77rem;
        text-transform: uppercase;
      }

      .limit-chip {
        padding: 6px 9px;
        border: 1px solid rgba(255, 209, 102, 0.42);
        border-radius: 999px;
        color: var(--accent-2);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.68rem;
        text-transform: uppercase;
        white-space: nowrap;
      }

      form {
        position: relative;
        display: flex;
        gap: 10px;
      }

      label {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      textarea,
      button {
        border-radius: 8px;
        font: inherit;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      textarea {
        width: 100%;
        min-height: 58px;
        max-height: 104px;
        min-width: 0;
        border: 2px solid rgba(255, 138, 61, 0.68);
        outline: none;
        resize: none;
        overflow: hidden;
        padding: 16px;
        background: #150811;
        color: var(--accent);
        font-family: "Share Tech Mono", monospace;
        font-size: clamp(1rem, 4vw, 1.3rem);
        line-height: 1.3;
        box-shadow: inset 0 0 18px rgba(255, 138, 61, 0.1);
        transition: border-color 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      }

      textarea::placeholder {
        color: rgba(255, 209, 102, 0.82);
      }

      .typing-caret {
        position: absolute;
        top: 50%;
        left: var(--caret-left, 18px);
        width: 2px;
        height: 1.45rem;
        border-radius: 999px;
        background: var(--accent-2);
        box-shadow: 0 0 10px rgba(255, 209, 102, 0.7);
        pointer-events: none;
        transform: translateY(-50%);
        animation: cursorBlink 0.9s steps(1) infinite;
      }

      textarea:focus {
        border-color: var(--accent-2);
        box-shadow:
          0 0 0 4px rgba(255, 138, 61, 0.14),
          inset 0 0 22px rgba(255, 138, 61, 0.15);
      }

      .panel.is-active textarea {
        border-color: rgba(255, 209, 102, 0.95);
        box-shadow:
          0 0 0 4px rgba(255, 138, 61, 0.2),
          0 0 28px rgba(255, 138, 61, 0.22),
          inset 0 0 26px rgba(255, 138, 61, 0.16);
      }

      button {
        flex: 0 0 120px;
        position: relative;
        height: 58px;
        border: 2px solid rgba(255, 209, 102, 0.9);
        background: linear-gradient(180deg, #ffe08a, #ff9f55);
        color: #1b0711;
        cursor: pointer;
        font-family: "Share Tech Mono", monospace;
        font-size: 1.08rem;
        font-weight: 700;
        box-shadow: 0 6px 0 #8f3b1f, 0 0 22px rgba(255, 138, 61, 0.25);
        transition: transform 150ms ease, box-shadow 150ms ease, filter 150ms ease;
      }

      button::after {
        position: absolute;
        right: 10%;
        bottom: -10px;
        left: 10%;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 138, 61, 0.28);
        filter: blur(7px);
        opacity: 0.7;
        content: "";
      }

      button:disabled {
        cursor: wait;
        filter: grayscale(0.4);
        opacity: 0.68;
      }

      .panel.is-offline textarea,
      .panel.is-offline button {
        cursor: not-allowed;
        filter: grayscale(0.35) brightness(0.82);
        opacity: 0.62;
      }

      button:hover:not(:disabled) {
        transform: translateY(-2px) rotate(-1deg);
        box-shadow: 0 8px 0 #8f3b1f, 0 0 30px rgba(255, 138, 61, 0.42);
        text-shadow:
          1px 0 rgba(255, 45, 96, 0.65),
          -1px 0 rgba(255, 209, 102, 0.75);
      }

      button:active:not(:disabled) {
        transform: translateY(5px) scale(0.98);
        box-shadow: 0 1px 0 #8f3b1f, 0 0 16px rgba(255, 138, 61, 0.3);
      }

      button.has-text {
        filter: brightness(1.12) saturate(1.15);
        box-shadow: 0 6px 0 #8f3b1f, 0 0 34px rgba(255, 138, 61, 0.4);
      }

      button.is-burst {
        animation: sendBurst 620ms ease;
      }

      .feedback {
        min-height: 22px;
        margin: 0;
        color: var(--accent);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.82rem;
        line-height: 1.45;
        text-transform: uppercase;
      }

      .feedback:not(:empty)::before {
        content: "> ";
      }

      .feedback.is-error {
        color: var(--danger);
      }

      .feedback.is-muted {
        color: var(--muted);
      }

      .terminal-log {
        min-height: 18px;
        margin: -4px 0 0;
        color: rgba(255, 209, 102, 0.58);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.72rem;
        letter-spacing: 0.02em;
        line-height: 1.2;
        opacity: 0;
        text-transform: uppercase;
        transform: translateY(-3px);
      }

      .terminal-log.is-visible {
        opacity: 0.72;
        transform: translateY(0);
      }

      .terminal-log::before {
        content: "// ";
      }

      .stats-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 120px;
        gap: 10px;
        padding-top: 4px;
        color: rgba(255, 241, 223, 0.72);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.68rem;
        line-height: 1.25;
        text-transform: uppercase;
      }

      .stats-row span {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .stats-row .timer {
        grid-column: 2;
        text-align: center;
        color: var(--accent-2);
        animation: timerFlicker 2.4s steps(2) infinite;
      }

      .mission-alert {
        position: absolute;
        top: clamp(42px, 8vw, 58px);
        left: clamp(16px, 4vw, 52px);
        z-index: 6;
        width: min(calc(100% - 190px), 420px);
        padding: 12px 16px;
        border: 2px solid rgba(255, 209, 102, 0.9);
        border-radius: 8px;
        background:
          linear-gradient(145deg, rgba(68, 28, 38, 0.96), rgba(18, 7, 18, 0.98)),
          var(--panel);
        box-shadow:
          0 0 26px rgba(255, 138, 61, 0.28),
          inset 0 0 18px rgba(255, 209, 102, 0.08);
        opacity: 0;
        pointer-events: none;
        transform: translateY(-10px) scale(0.98);
      }

      .mission-alert.is-visible {
        animation: alertPop 32s ease both;
      }

      .mission-alert__label,
      .mission-alert__text {
        margin: 0;
        font-family: "Share Tech Mono", monospace;
        text-transform: uppercase;
      }

      .mission-alert__label {
        color: var(--muted);
        font-size: 0.68rem;
      }

      .mission-alert__text {
        margin-top: 5px;
        color: var(--accent-2);
        font-size: 1rem;
        text-shadow: 0 0 12px rgba(255, 209, 102, 0.42);
      }

      .rules {
        display: none;
        flex-wrap: wrap;
        gap: 8px;
      }

      .rule {
        padding: 7px 9px;
        border: 1px solid rgba(255, 138, 61, 0.28);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.2);
        color: #fff0ce;
        font-size: 1rem;
        text-transform: uppercase;
      }

      @keyframes sweep {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.55;
          transform: scale(0.82);
        }
        50% {
          opacity: 1;
          transform: scale(1.16);
        }
      }

      @keyframes flicker {
        0%,
        100% {
          opacity: 0.22;
        }
        12% {
          opacity: 0.34;
        }
        13% {
          opacity: 0.18;
        }
        51% {
          opacity: 0.28;
        }
      }

      @keyframes cursorBlink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0.18;
        }
      }

      @keyframes alertPop {
        0% {
          opacity: 0;
          transform: translateY(16px) scale(0.96);
        }
        12%,
        94% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
        18% {
          transform: translateY(0) scale(1.02) rotate(-0.5deg);
        }
        24% {
          transform: translateY(0) scale(1) rotate(0.35deg);
        }
        100% {
          opacity: 0;
          transform: translateY(10px) scale(0.98);
        }
      }

      @keyframes glitchFade {
        0% {
          opacity: 0.45;
          transform: translateX(-2px);
          text-shadow: 1px 0 rgba(255, 45, 96, 0.6), -1px 0 rgba(255, 209, 102, 0.5);
        }
        45% {
          opacity: 1;
          transform: translateX(2px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
          text-shadow: none;
        }
      }

      @keyframes timerFlicker {
        0%,
        100% {
          opacity: 0.78;
        }
        50% {
          opacity: 1;
          text-shadow: 0 0 10px rgba(255, 209, 102, 0.38);
        }
      }

      @keyframes transmitPulse {
        0%,
        100% {
          filter: none;
        }
        50% {
          filter: brightness(1.12);
          box-shadow:
            0 0 42px rgba(255, 92, 61, 0.24),
            inset 0 0 36px rgba(255, 138, 61, 0.18);
        }
      }

      @keyframes sendBurst {
        0% {
          filter: brightness(1.1);
          box-shadow: 0 6px 0 #8f3b1f, 0 0 22px rgba(255, 138, 61, 0.25);
        }
        45% {
          filter: brightness(1.28) saturate(1.25);
          box-shadow: 0 6px 0 #8f3b1f, 0 0 42px rgba(255, 209, 102, 0.52);
        }
        100% {
          filter: brightness(1.08);
          box-shadow: 0 6px 0 #8f3b1f, 0 0 26px rgba(255, 138, 61, 0.28);
        }
      }

      @keyframes grainDrift {
        0% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(1px, -1px);
        }
        100% {
          transform: translate(-1px, 1px);
        }
      }

      @media (max-width: 760px) {
        .console {
          padding: 16px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .status-stack {
          width: 100%;
          min-width: 0;
          grid-template-columns: 1fr 1fr;
        }

        .mission-grid {
          grid-template-columns: 1fr;
        }

      }

      @media (max-width: 520px) {
        .clock-chip {
          justify-self: start;
        }

        .stats-row {
          grid-template-columns: 1fr;
        }

        .stats-row .timer {
          grid-column: auto;
          text-align: left;
        }

        form {
          flex-direction: column;
        }

        button {
          flex-basis: 58px;
          width: 100%;
        }

        .status-stack {
          grid-template-columns: 1fr;
        }

        .mission-alert {
          top: clamp(44px, 12vw, 58px);
          right: clamp(16px, 4vw, 28px);
          left: clamp(16px, 4vw, 28px);
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="console" aria-label="Sector message mission console">
      <section class="mission-grid">
        <section class="panel" aria-label="Message input">
          <div class="terminal-head">
            <time class="clock-chip" id="militaryClock" aria-label="Current 24-hour time">00:00:00</time>
          </div>
          <aside class="mission-alert" id="missionAlert" aria-live="polite" aria-hidden="true">
            <p class="mission-alert__label">signal reply</p>
            <p class="mission-alert__text" id="missionAlertText"></p>
          </aside>
          <form id="messageForm" novalidate>
            <label for="messageInput">Message</label>
            <textarea
              id="messageInput"
              name="message"
              autocomplete="off"
              maxlength="26"
              placeholder=""
              rows="1"
              spellcheck="false"
              required
            ></textarea>
            <span class="typing-caret" id="typingCaret" aria-hidden="true"></span>
            <button id="sendButton" type="submit">Send</button>
          </form>

          <p class="terminal-log" id="terminalLog" aria-hidden="true"></p>
          <p class="feedback" id="feedback" role="status" aria-live="polite"></p>
          <div class="stats-row" aria-label="Terminal activity stats">
            <span id="usersOnline">0 USERS ONLINE</span>
            <span class="timer" id="resetTimer">MESSAGE COUNTER RESETS IN 00:00:00</span>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://hrsrjfpygekjyuwibsia.supabase.co";
      const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_Sl962RuGBx2L5aWFmeeCUQ_t-p0YEHW";

      const form = document.querySelector("#messageForm");
      const input = document.querySelector("#messageInput");
      const sendButton = document.querySelector("#sendButton");
      const feedback = document.querySelector("#feedback");
      const typingCaret = document.querySelector("#typingCaret");
      const militaryClock = document.querySelector("#militaryClock");
      const panel = document.querySelector(".panel");
      const consoleShell = document.querySelector(".console");
      const terminalLog = document.querySelector("#terminalLog");
      const usersOnline = document.querySelector("#usersOnline");
      const resetTimer = document.querySelector("#resetTimer");
      const missionAlert = document.querySelector("#missionAlert");
      const missionAlertText = document.querySelector("#missionAlertText");
      const clientIdKey = "sector-message-drop-client-id";
      const deviceLimitKey = "sector-message-drop-device-window";
      const responseCooldownMs = 3500;
      const keywordReplies = [
        { keyword: "snapchat", reply: "ramsland9000" },
        { keyword: "rollerblade", reply: "ramsland9000" },
      ];
      const terminalLogs = [
        "interface ready...",
        "key loaded...",
        "awaiting drop...",
        "local timer active...",
      ];
      const placeholders = [
        "DROP MSG",
      ];
      const transmitSteps = [
        "checking window...",
        "preparing drop...",
        "sending...",
      ];
      let audioContext;
      let lastMissionAlertAt = 0;
      let logTimer;
      let logTypingTimer;
      let placeholderIndex = 0;
      let dropWindowClosed = false;
      let isSending = false;

      const isConfigured =
        SUPABASE_URL.startsWith("https://") &&
        SUPABASE_PUBLISHABLE_KEY !== "PASTE_YOUR_SUPABASE_PUBLISHABLE_KEY_HERE";

      const client = isConfigured
        ? window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY)
        : null;

      const setFeedback = (message, type = "") => {
        feedback.textContent = message;
        feedback.className = type ? `feedback ${type}` : "feedback";
      };

      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const updateMilitaryClock = () => {
        const now = new Date();
        militaryClock.dateTime = now.toISOString();
        militaryClock.textContent = new Intl.DateTimeFormat(undefined, {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        }).format(now);
      };

      const updateActivityState = () => {
        const hasText = input.value.length > 0;
        panel.classList.toggle("is-active", hasText);
        sendButton.classList.toggle("has-text", hasText);
      };

      const getDenverHour = () => {
        const hourText = new Intl.DateTimeFormat("en-US", {
          timeZone: "America/Denver",
          hour: "2-digit",
          hour12: false,
        }).format(new Date());
        const hour = Number(hourText);
        return hour === 24 ? 0 : hour;
      };

      const isDropWindowClosed = () => {
        const hour = getDenverHour();
        return hour >= 22 || hour < 8;
      };

      const closedWindowMessage = "DROP CHANNEL OFFLINE. RETURNS AT 08:00 MST.";

      const updateDropWindowState = () => {
        dropWindowClosed = isDropWindowClosed();
        input.disabled = dropWindowClosed || isSending;
        sendButton.disabled = dropWindowClosed || isSending;
        panel.classList.toggle("is-offline", dropWindowClosed);

        if (dropWindowClosed) {
          setFeedback(closedWindowMessage, "is-error");
        } else if (feedback.textContent === closedWindowMessage) {
          setFeedback("");
        }
      };

      const updatePlaceholder = () => {
        if (input.value) return;
        input.placeholder = placeholders[placeholderIndex % placeholders.length];
        placeholderIndex += 1;
      };

      const getMissionReply = (message) => {
        const normalizedMessage = message.toLowerCase();
        const match = keywordReplies.find(({ keyword }) => normalizedMessage.includes(keyword));
        return match?.reply || "";
      };

      const showMissionAlert = (reply) => {
        const now = Date.now();

        if (now - lastMissionAlertAt < responseCooldownMs) return;

        lastMissionAlertAt = now;
        missionAlertText.textContent = reply;
        missionAlert.setAttribute("aria-hidden", "false");
        missionAlert.classList.remove("is-visible");
        void missionAlert.offsetWidth;
        missionAlert.classList.add("is-visible");
      };

      const getClientId = () => {
        let clientId = localStorage.getItem(clientIdKey);

        if (!clientId) {
          clientId = crypto.randomUUID();
          localStorage.setItem(clientIdKey, clientId);
        }

        return clientId;
      };

      const validate = (value) => {
        if (!value) return "Enter a message.";
        if (value.length > 26) return "Message max is 26 characters.";
        if (/\s/.test(value)) return "No spaces.";
        return "";
      };

      const formatDuration = (seconds) => {
        const safeSeconds = Math.max(Number(seconds) || 0, 0);
        const minutes = Math.floor(safeSeconds / 60);
        const remainder = safeSeconds % 60;

        if (minutes && remainder) return `${minutes}m ${remainder}s`;
        if (minutes) return `${minutes}m`;
        return `${remainder}s`;
      };

      const rollingLimitMs = 60 * 60 * 1000;
      const deviceLimitPerHour = 2;

      const getDeviceLimit = () => {
        try {
          return JSON.parse(localStorage.getItem(deviceLimitKey) || "{}");
        } catch {
          return {};
        }
      };

      const getDeviceDropTimes = () => {
        const savedLimit = getDeviceLimit();
        const rawTimes = Array.isArray(savedLimit.sentAtList) ? savedLimit.sentAtList : [savedLimit.sentAt];
        const cutoff = Date.now() - rollingLimitMs;
        return rawTimes
          .map((sentAt) => Number(sentAt) || 0)
          .filter((sentAt) => sentAt > cutoff)
          .sort((a, b) => a - b);
      };

      const markDeviceLimitUsed = () => {
        const sentAtList = [...getDeviceDropTimes(), Date.now()].slice(-deviceLimitPerHour);
        localStorage.setItem(deviceLimitKey, JSON.stringify({ sentAtList }));
      };

      const getDeviceLimitIssue = () => {
        const sentAtList = getDeviceDropTimes();

        if (sentAtList.length < deviceLimitPerHour) return "";

        const resetAt = sentAtList[0] + rollingLimitMs;
        const resetSeconds = Math.max(Math.ceil((resetAt - Date.now()) / 1000), 0);

        if (resetSeconds > 0) {
          return `DEVICE/IP WINDOW CLOSED. 2 MESSAGES PER HOUR. RESETS IN ${formatDuration(resetSeconds)}.`;
        }

        return "";
      };

      const getResetSeconds = () => {
        const sentAtList = getDeviceDropTimes();

        if (sentAtList.length < deviceLimitPerHour) return 0;

        return Math.max(Math.ceil((sentAtList[0] + rollingLimitMs - Date.now()) / 1000), 0);
      };

      const formatCountdown = (seconds) => {
        const safeSeconds = Math.max(Number(seconds) || 0, 0);
        const hours = Math.floor(safeSeconds / 3600);
        const minutes = Math.floor((safeSeconds % 3600) / 60);
        const remainder = safeSeconds % 60;
        return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(remainder).padStart(2, "0")}`;
      };

      const updateResetTimer = () => {
        resetTimer.textContent = `MESSAGE COUNTER RESETS IN ${formatCountdown(getResetSeconds())}`;
      };

      const updateOnlineUsers = (count) => {
        const safeCount = Math.max(Number(count) || 0, 0);
        usersOnline.textContent = `${safeCount} ${safeCount === 1 ? "USER" : "USERS"} ONLINE`;
      };

      const initPresence = () => {
        if (!client) return;

        const channel = client.channel("drop-terminal-presence", {
          config: { presence: { key: getClientId() } },
        });

        channel
          .on("presence", { event: "sync" }, () => {
            const state = channel.presenceState();
            const count = Object.values(state).reduce((total, entries) => total + entries.length, 0);
            updateOnlineUsers(count);
          })
          .subscribe(async (status) => {
            if (status === "SUBSCRIBED") {
              await channel.track({ online_at: new Date().toISOString() });
            }
          });
      };

      const showTerminalLog = (message) => {
        clearTimeout(logTypingTimer);
        terminalLog.textContent = "";
        terminalLog.classList.add("is-visible");

        let index = 0;
        const typeNext = () => {
          terminalLog.textContent = message.slice(0, index);
          index += 1;

          if (index <= message.length) {
            logTypingTimer = setTimeout(typeNext, 28);
          } else {
            logTypingTimer = setTimeout(() => {
              terminalLog.classList.remove("is-visible");
            }, 1300);
          }
        };

        typeNext();
      };

      const autoExpandInput = () => {
        input.style.height = "auto";
        input.style.height = `${Math.min(input.scrollHeight, 104)}px`;
      };

      const runTransmitSequence = async () => {
        for (const step of transmitSteps) {
          setFeedback(step, "is-muted");
          showTerminalLog(step);
          await wait(380);
        }
      };

      const runSendBurst = () => {
        sendButton.classList.remove("is-burst");
        void sendButton.offsetWidth;
        sendButton.classList.add("is-burst");
        setTimeout(() => sendButton.classList.remove("is-burst"), 700);
      };

      const scheduleTerminalLog = () => {
        const delay = 2600 + Math.random() * 3400;
        logTimer = setTimeout(() => {
          const message = terminalLogs[Math.floor(Math.random() * terminalLogs.length)];
          showTerminalLog(message);
          scheduleTerminalLog();
        }, delay);
      };

      const updateCaret = () => {
        const inputStyles = getComputedStyle(input);
        const fontSize = parseFloat(inputStyles.fontSize);
        const leftPadding = parseFloat(inputStyles.paddingLeft);
        const characterWidth = fontSize * 0.62;
        const visibleLength = Math.min(input.value.length, 26);
        typingCaret.style.setProperty("--caret-left", `${leftPadding + visibleLength * characterWidth}px`);
      };

      const playTypewriterClick = () => {
        audioContext ||= new (window.AudioContext || window.webkitAudioContext)();

        const now = audioContext.currentTime;
        const noiseLength = Math.floor(audioContext.sampleRate * 0.035);
        const noiseBuffer = audioContext.createBuffer(1, noiseLength, audioContext.sampleRate);
        const noiseData = noiseBuffer.getChannelData(0);
        const noise = audioContext.createBufferSource();
        const click = audioContext.createOscillator();
        const noiseGain = audioContext.createGain();
        const clickGain = audioContext.createGain();
        const filter = audioContext.createBiquadFilter();

        for (let index = 0; index < noiseLength; index += 1) {
          noiseData[index] = (Math.random() * 2 - 1) * (1 - index / noiseLength);
        }

        noise.buffer = noiseBuffer;
        filter.type = "bandpass";
        filter.frequency.setValueAtTime(2400 + Math.random() * 500, now);
        filter.Q.setValueAtTime(1.6, now);

        click.type = "square";
        click.frequency.setValueAtTime(1200 + Math.random() * 180, now);
        clickGain.gain.setValueAtTime(0.0001, now);
        clickGain.gain.exponentialRampToValueAtTime(0.045, now + 0.002);
        clickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.018);

        noiseGain.gain.setValueAtTime(0.0001, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.16, now + 0.002);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.034);

        noise.connect(filter);
        filter.connect(noiseGain);
        noiseGain.connect(audioContext.destination);
        click.connect(clickGain);
        clickGain.connect(audioContext.destination);
        noise.start(now);
        click.start(now);
        noise.stop(now + 0.04);
        click.stop(now + 0.02);
      };

      input.addEventListener("keydown", (event) => {
        const isSingleCharacter = event.key.length === 1;
        const hasRoom = input.value.length < 26 || input.selectionStart !== input.selectionEnd;

        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          return;
        }

        if (isSingleCharacter && !/\s/.test(event.key) && hasRoom) {
          playTypewriterClick();
        }
      });

      input.addEventListener("input", () => {
        input.value = input.value.replace(/\s/g, "").slice(0, 26);
        autoExpandInput();
        updateCaret();
        updateActivityState();
      });

      consoleShell.addEventListener("pointermove", (event) => {
        const rect = consoleShell.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width;
        const y = (event.clientY - rect.top) / rect.height;
        consoleShell.style.setProperty("--mouse-x", `${x * 100}%`);
        consoleShell.style.setProperty("--mouse-y", `${y * 100}%`);
        consoleShell.style.setProperty("--tilt-x", `${(x - 0.5) * 2.5}deg`);
        consoleShell.style.setProperty("--tilt-y", `${(0.5 - y) * 2.5}deg`);
      });

      consoleShell.addEventListener("pointerleave", () => {
        consoleShell.style.setProperty("--tilt-x", "0deg");
        consoleShell.style.setProperty("--tilt-y", "0deg");
      });

      window.addEventListener("resize", updateCaret);
      updateMilitaryClock();
      setInterval(updateMilitaryClock, 1000);
      updatePlaceholder();
      setInterval(updatePlaceholder, 3200);
      updateActivityState();
      autoExpandInput();
      updateResetTimer();
      setInterval(updateResetTimer, 1000);
      updateDropWindowState();
      setInterval(updateDropWindowState, 30000);
      initPresence();
      scheduleTerminalLog();
      updateCaret();

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        updateDropWindowState();
        if (dropWindowClosed) return;

        const value = input.value.trim();
        const issue = validate(value);

        if (issue) {
          setFeedback(issue, "is-error");
          return;
        }

        const deviceLimitIssue = getDeviceLimitIssue();
        if (deviceLimitIssue) {
          setFeedback(deviceLimitIssue, "is-error");
          return;
        }

        const missionReply = getMissionReply(value);
        if (missionReply) showMissionAlert(missionReply);

        if (!client) {
          setFeedback("Supabase link is not configured.", "is-error");
          return;
        }

        isSending = true;
        updateDropWindowState();
        panel.classList.add("is-sending");
        await runTransmitSequence();

        try {
          const { data, error } = await client.rpc("submit_drop", {
            p_message: value,
            p_client_id: getClientId(),
          });

          if (error) {
            console.error("Supabase drop failed:", error);
            setFeedback(error.message || "Drop failed. Try again.", "is-error");
            return;
          }

          if (!data?.ok) {
            const resetText = data?.reset_seconds ? formatDuration(data.reset_seconds) : "later";
            setFeedback(data?.message || `DEVICE/IP WINDOW CLOSED. 2 MESSAGES PER HOUR. RESETS IN ${resetText}.`, "is-error");
            return;
          }

          input.value = "";
          autoExpandInput();
          updateCaret();
          updateActivityState();
          markDeviceLimitUsed();
          updateResetTimer();
          runSendBurst();
          if (Number.isInteger(data.device_remaining) && Number.isInteger(data.reset_seconds)) {
            if (data.device_remaining > 0) {
              const remainingText = data.device_remaining === 1 ? "one" : String(data.device_remaining);
              setFeedback(`MSG sent - ${remainingText} remaining for ${formatDuration(data.reset_seconds)}`);
            } else {
              setFeedback("MSG sent - two messages per hour");
            }
          } else {
            setFeedback("MSG sent");
          }
        } finally {
          isSending = false;
          panel.classList.remove("is-sending");
          updateDropWindowState();
        }
      });
    </script>
  </body>
</html>
