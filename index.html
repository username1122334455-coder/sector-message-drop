<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sector Message Drop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand+SC&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #100713;
        --panel: #24101b;
        --panel-2: #2c1420;
        --text: #fff1df;
        --muted: #d9a68a;
        --accent: #ff8a3d;
        --accent-2: #ffd166;
        --danger: #ff5d73;
        --ink: #281007;
        font-family: "Patrick Hand SC", "Trebuchet MS", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: clamp(14px, 4vw, 34px);
        overflow-x: hidden;
        color: var(--text);
        background-color: var(--bg);
        background-image: radial-gradient(rgba(255, 255, 255, 0.38) 1px, transparent 1px);
        background-size: 18px 18px;
      }

      body::before,
      body::after {
        display: none;
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        content: "";
      }

      body::before {
        background:
          radial-gradient(circle at center, rgba(255, 138, 61, 0.12) 0 1px, transparent 1px),
          linear-gradient(rgba(255, 138, 61, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 138, 61, 0.045) 1px, transparent 1px);
        background-size: 18px 18px, 42px 42px, 42px 42px;
        opacity: 0.36;
      }

      body::after {
        z-index: 4;
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.035) 0,
          rgba(255, 255, 255, 0.035) 1px,
          transparent 1px,
          transparent 5px
        );
        mix-blend-mode: screen;
        opacity: 0.28;
        animation: flicker 5s infinite steps(1);
      }

      .console {
        position: relative;
        width: min(100%, 760px);
        padding: clamp(16px, 4vw, 28px);
        border: 0;
        border-radius: 8px;
        background:
          linear-gradient(145deg, rgba(68, 28, 38, 0.88), rgba(18, 7, 18, 0.94)),
          var(--panel);
        backdrop-filter: blur(4px) saturate(1.15);
        box-shadow:
          0 0 36px rgba(255, 138, 61, 0.28),
          inset 0 0 42px rgba(255, 138, 61, 0.08);
      }

      .console::before {
        display: none;
        position: absolute;
        inset: 10px;
        border: 1px dashed rgba(255, 209, 102, 0.28);
        border-radius: 5px;
        pointer-events: none;
        content: "";
      }

      .topbar {
        position: relative;
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: clamp(18px, 4vw, 28px);
      }

      .brand {
        min-width: 0;
      }

      .kicker {
        margin: 0 0 4px;
        color: var(--accent-2);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.78rem;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--text);
        font-family: "Bangers", "Arial Black", Impact, sans-serif;
        font-size: clamp(2.25rem, 10vw, 5rem);
        font-weight: 400;
        letter-spacing: 0;
        line-height: 0.88;
        text-shadow: 4px 4px 0 #351220, 0 0 18px rgba(255, 138, 61, 0.36);
      }

      .status-stack {
        display: grid;
        gap: 8px;
        flex: 0 0 auto;
        min-width: 138px;
      }

      .status-pill {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 7px 10px;
        border: 1px solid rgba(255, 138, 61, 0.5);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.36);
        color: var(--accent);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.72rem;
        text-transform: uppercase;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent);
        animation: pulse 1.35s infinite;
      }

      .mission-grid {
        position: relative;
        display: grid;
        grid-template-columns: 1fr;
        gap: clamp(16px, 4vw, 26px);
        align-items: stretch;
      }

      .radar {
        display: none;
      }

      .radar::before {
        position: absolute;
        inset: 50% auto auto 50%;
        width: 170%;
        height: 170%;
        background: conic-gradient(from 0deg, rgba(255, 138, 61, 0.45), transparent 28%);
        transform-origin: 0 0;
        content: "";
        animation: sweep 4.5s linear infinite;
      }

      .radar::after {
        position: absolute;
        inset: 18px;
        border: 1px solid rgba(255, 209, 102, 0.34);
        border-radius: 50%;
        content: "";
        box-shadow: inset 0 0 26px rgba(255, 138, 61, 0.16);
      }

      .blip {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 14px var(--accent-2);
        animation: pulse 1.6s infinite;
      }

      .blip.one {
        top: 31%;
        left: 65%;
      }

      .blip.two {
        top: 66%;
        left: 38%;
        animation-delay: 0.45s;
      }

      .radar-label {
        position: absolute;
        left: 16px;
        bottom: 14px;
        margin: 0;
        color: var(--accent);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.74rem;
        text-transform: uppercase;
      }

      .panel {
        position: relative;
        display: grid;
        align-content: center;
        gap: 14px;
        padding: clamp(16px, 4vw, 26px);
        border: 0;
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(58, 22, 31, 0.84), rgba(16, 6, 16, 0.82)),
          var(--panel-2);
      }

      .panel-title {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .panel-title p {
        margin: 0;
        color: var(--muted);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.77rem;
        text-transform: uppercase;
      }

      .limit-chip {
        padding: 6px 9px;
        border: 1px solid rgba(255, 209, 102, 0.42);
        border-radius: 999px;
        color: var(--accent-2);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.68rem;
        text-transform: uppercase;
        white-space: nowrap;
      }

      form {
        position: relative;
        display: flex;
        gap: 10px;
      }

      label {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      input,
      button {
        height: 58px;
        border-radius: 8px;
        font: inherit;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-width: 0;
        border: 2px solid rgba(255, 138, 61, 0.68);
        outline: none;
        padding: 0 16px;
        background: #150811;
        color: var(--accent);
        font-family: "Share Tech Mono", monospace;
        font-size: clamp(1rem, 4vw, 1.3rem);
        box-shadow: inset 0 0 18px rgba(255, 138, 61, 0.1);
      }

      input::placeholder {
        color: rgba(255, 209, 102, 0.82);
      }

      .typing-caret {
        position: absolute;
        top: 50%;
        left: var(--caret-left, 18px);
        width: 2px;
        height: 1.45rem;
        border-radius: 999px;
        background: var(--accent-2);
        box-shadow: 0 0 10px rgba(255, 209, 102, 0.7);
        pointer-events: none;
        transform: translateY(-50%);
        animation: cursorBlink 0.9s steps(1) infinite;
      }

      input:focus {
        border-color: var(--accent-2);
        box-shadow:
          0 0 0 4px rgba(255, 138, 61, 0.14),
          inset 0 0 22px rgba(255, 138, 61, 0.15);
      }

      button {
        flex: 0 0 120px;
        border: 2px solid rgba(255, 209, 102, 0.9);
        background: linear-gradient(180deg, #ffd166, #ff8a3d);
        color: var(--ink);
        cursor: pointer;
        font-family: "Bangers", "Arial Black", Impact, sans-serif;
        font-size: 1.55rem;
        box-shadow: 0 6px 0 #8f3b1f, 0 0 22px rgba(255, 138, 61, 0.25);
        transition: transform 150ms ease, box-shadow 150ms ease, filter 150ms ease;
      }

      button:disabled {
        cursor: wait;
        filter: grayscale(0.4);
        opacity: 0.68;
      }

      button:hover:not(:disabled) {
        transform: translateY(-2px) rotate(-1deg);
        box-shadow: 0 8px 0 #8f3b1f, 0 0 30px rgba(255, 138, 61, 0.42);
      }

      button:active:not(:disabled) {
        transform: translateY(4px);
        box-shadow: 0 2px 0 #8f3b1f;
      }

      .feedback {
        min-height: 22px;
        margin: 0;
        color: var(--accent);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.82rem;
        line-height: 1.45;
        text-transform: uppercase;
      }

      .feedback::before {
        content: "> ";
      }

      .feedback.is-error {
        color: var(--danger);
      }

      .feedback.is-muted {
        color: var(--muted);
      }

      .rules {
        display: none;
        flex-wrap: wrap;
        gap: 8px;
      }

      .rule {
        padding: 7px 9px;
        border: 1px solid rgba(255, 138, 61, 0.28);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.2);
        color: #fff0ce;
        font-size: 1rem;
        text-transform: uppercase;
      }

      @keyframes sweep {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.55;
          transform: scale(0.82);
        }
        50% {
          opacity: 1;
          transform: scale(1.16);
        }
      }

      @keyframes flicker {
        0%,
        100% {
          opacity: 0.22;
        }
        12% {
          opacity: 0.34;
        }
        13% {
          opacity: 0.18;
        }
        51% {
          opacity: 0.28;
        }
      }

      @keyframes cursorBlink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0.18;
        }
      }

      @media (max-width: 760px) {
        .console {
          padding: 16px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .status-stack {
          width: 100%;
          min-width: 0;
          grid-template-columns: 1fr 1fr;
        }

        .mission-grid {
          grid-template-columns: 1fr;
        }

      }

      @media (max-width: 520px) {
        form {
          flex-direction: column;
        }

        button {
          flex-basis: 58px;
          width: 100%;
        }

        .status-stack {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="console" aria-label="Sector message mission console">
      <section class="mission-grid">
        <section class="panel" aria-label="Message input">
          <form id="messageForm" novalidate>
            <label for="messageInput">Message</label>
            <input
              id="messageInput"
              name="message"
              autocomplete="off"
              maxlength="15"
              pattern="\S{1,15}"
              placeholder=""
              required
            />
            <span class="typing-caret" id="typingCaret" aria-hidden="true"></span>
            <button id="sendButton" type="submit">Send</button>
          </form>

          <p class="feedback" id="feedback" role="status" aria-live="polite">Ready for drop.</p>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://hrsrjfpygekjyuwibsia.supabase.co";
      const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_Sl962RuGBx2L5aWFmeeCUQ_t-p0YEHW";

      const form = document.querySelector("#messageForm");
      const input = document.querySelector("#messageInput");
      const sendButton = document.querySelector("#sendButton");
      const feedback = document.querySelector("#feedback");
      const typingCaret = document.querySelector("#typingCaret");
      const clientIdKey = "sector-message-drop-client-id";
      let audioContext;

      const isConfigured =
        SUPABASE_URL.startsWith("https://") &&
        SUPABASE_PUBLISHABLE_KEY !== "PASTE_YOUR_SUPABASE_PUBLISHABLE_KEY_HERE";

      const client = isConfigured
        ? window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY)
        : null;

      const setFeedback = (message, type = "") => {
        feedback.textContent = message;
        feedback.className = type ? `feedback ${type}` : "feedback";
      };

      const getClientId = () => {
        let clientId = localStorage.getItem(clientIdKey);

        if (!clientId) {
          clientId = crypto.randomUUID();
          localStorage.setItem(clientIdKey, clientId);
        }

        return clientId;
      };

      const validate = (value) => {
        if (!value) return "Enter a codeword.";
        if (value.length > 15) return "Codeword max is 15 characters.";
        if (/\s/.test(value)) return "No spaces in the drop.";
        return "";
      };

      const formatDuration = (seconds) => {
        const safeSeconds = Math.max(Number(seconds) || 0, 0);
        const minutes = Math.floor(safeSeconds / 60);
        const remainder = safeSeconds % 60;

        if (minutes && remainder) return `${minutes}m ${remainder}s`;
        if (minutes) return `${minutes}m`;
        return `${remainder}s`;
      };

      const updateCaret = () => {
        const inputStyles = getComputedStyle(input);
        const fontSize = parseFloat(inputStyles.fontSize);
        const leftPadding = parseFloat(inputStyles.paddingLeft);
        const characterWidth = fontSize * 0.62;
        const visibleLength = Math.min(input.value.length, 15);
        typingCaret.style.setProperty("--caret-left", `${leftPadding + visibleLength * characterWidth}px`);
      };

      const playTypewriterClick = () => {
        audioContext ||= new (window.AudioContext || window.webkitAudioContext)();

        const now = audioContext.currentTime;
        const noiseLength = Math.floor(audioContext.sampleRate * 0.035);
        const noiseBuffer = audioContext.createBuffer(1, noiseLength, audioContext.sampleRate);
        const noiseData = noiseBuffer.getChannelData(0);
        const noise = audioContext.createBufferSource();
        const click = audioContext.createOscillator();
        const noiseGain = audioContext.createGain();
        const clickGain = audioContext.createGain();
        const filter = audioContext.createBiquadFilter();

        for (let index = 0; index < noiseLength; index += 1) {
          noiseData[index] = (Math.random() * 2 - 1) * (1 - index / noiseLength);
        }

        noise.buffer = noiseBuffer;
        filter.type = "bandpass";
        filter.frequency.setValueAtTime(2400 + Math.random() * 500, now);
        filter.Q.setValueAtTime(1.6, now);

        click.type = "square";
        click.frequency.setValueAtTime(1200 + Math.random() * 180, now);
        clickGain.gain.setValueAtTime(0.0001, now);
        clickGain.gain.exponentialRampToValueAtTime(0.045, now + 0.002);
        clickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.018);

        noiseGain.gain.setValueAtTime(0.0001, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.16, now + 0.002);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.034);

        noise.connect(filter);
        filter.connect(noiseGain);
        noiseGain.connect(audioContext.destination);
        click.connect(clickGain);
        clickGain.connect(audioContext.destination);
        noise.start(now);
        click.start(now);
        noise.stop(now + 0.04);
        click.stop(now + 0.02);
      };

      input.addEventListener("keydown", (event) => {
        const isSingleCharacter = event.key.length === 1;
        const hasRoom = input.value.length < 15 || input.selectionStart !== input.selectionEnd;

        if (isSingleCharacter && !/\s/.test(event.key) && hasRoom) {
          playTypewriterClick();
        }
      });

      input.addEventListener("input", () => {
        input.value = input.value.replace(/\s/g, "").slice(0, 15);
        updateCaret();
        setFeedback("Ready for drop.");
      });

      window.addEventListener("resize", updateCaret);
      updateCaret();

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const value = input.value.trim();
        const issue = validate(value);

        if (issue) {
          setFeedback(issue, "is-error");
          return;
        }

        if (!client) {
          setFeedback("Supabase link is not configured.", "is-error");
          return;
        }

        sendButton.disabled = true;
        setFeedback("Encrypting drop...", "is-muted");

        try {
          const { data, error } = await client.rpc("submit_drop", {
            p_message: value,
            p_client_id: getClientId(),
          });

          if (error) {
            console.error("Supabase drop failed:", error);
            setFeedback(error.message || "Drop failed. Try again.", "is-error");
            return;
          }

          if (!data?.ok) {
            const resetText = data?.reset_seconds ? ` Try again in ${formatDuration(data.reset_seconds)}.` : "";
            setFeedback(`${data?.message || "Limit reached."}${resetText}`, "is-error");
            return;
          }

          input.value = "";
          updateCaret();
          if (Number.isInteger(data.device_remaining) && Number.isInteger(data.reset_seconds)) {
            if (data.device_remaining > 0) {
              const remainingText = data.device_remaining === 1 ? "one" : String(data.device_remaining);
              setFeedback(`MSG sent - ${remainingText} remaining for ${formatDuration(data.reset_seconds)}`);
            } else {
              setFeedback(`MSG sent - next in ${formatDuration(data.reset_seconds)}`);
            }
          } else {
            setFeedback("MSG sent");
          }
        } finally {
          sendButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
