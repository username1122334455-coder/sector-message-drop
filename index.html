<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sector Message Drop</title>
    <style>
      :root {
        --bg: #030303;
        --text: #f4f7f2;
        --accent: #7dff6b;
        --danger: #ff7373;
        --muted: #9aa79a;
        font-family: "Trebuchet MS", "Arial Black", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 18px;
        color: var(--text);
        background-color: var(--bg);
        background-image: radial-gradient(rgba(255, 255, 255, 0.38) 1px, transparent 1px);
        background-size: 18px 18px;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        content: "";
        background: rgba(0, 0, 0, 0.72);
      }

      form {
        display: flex;
        width: min(100%, 520px);
        gap: 10px;
      }

      label {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      input,
      button {
        height: 54px;
        border-radius: 8px;
        font: inherit;
        font-family: "Arial Black", Impact, sans-serif;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-width: 0;
        border: 1px solid rgba(125, 255, 107, 0.42);
        outline: none;
        padding: 0 16px;
        background: #050705;
        color: var(--text);
        font-size: 1.1rem;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(125, 255, 107, 0.12);
      }

      button {
        flex: 0 0 112px;
        border: 0;
        background: var(--accent);
        color: #071007;
        cursor: pointer;
        font-weight: 900;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      button:hover:not(:disabled) {
        filter: brightness(1.06);
      }

      .feedback {
        position: absolute;
        top: calc(50% + 38px);
        left: 50%;
        width: min(100% - 36px, 520px);
        margin: 0;
        transform: translateX(-50%);
        color: var(--accent);
        font-size: 0.86rem;
        font-weight: 800;
        text-align: left;
        text-transform: uppercase;
      }

      .feedback.is-error {
        color: var(--danger);
      }

      .feedback.is-muted {
        color: var(--muted);
      }

      @media (max-width: 520px) {
        form {
          flex-direction: column;
        }

        button {
          flex-basis: 54px;
          width: 100%;
        }

        .feedback {
          top: calc(50% + 70px);
        }
      }
    </style>
  </head>
  <body>
    <form id="messageForm" novalidate>
      <label for="messageInput">Message</label>
      <input
        id="messageInput"
        name="message"
        autocomplete="off"
        maxlength="15"
        pattern="\S{1,15}"
        placeholder="MESSAGE"
        required
      />
      <button id="sendButton" type="submit">Send</button>
    </form>
    <p class="feedback" id="feedback" role="status" aria-live="polite"></p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://hrsrjfpygekjyuwibsia.supabase.co";
      const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_Sl962RuGBx2L5aWFmeeCUQ_t-p0YEHW";

      const form = document.querySelector("#messageForm");
      const input = document.querySelector("#messageInput");
      const sendButton = document.querySelector("#sendButton");
      const feedback = document.querySelector("#feedback");
      const clientIdKey = "sector-message-drop-client-id";

      const isConfigured =
        SUPABASE_URL.startsWith("https://") &&
        SUPABASE_PUBLISHABLE_KEY !== "PASTE_YOUR_SUPABASE_PUBLISHABLE_KEY_HERE";

      const client = isConfigured
        ? window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY)
        : null;

      const setFeedback = (message, type = "") => {
        feedback.textContent = message;
        feedback.className = type ? `feedback ${type}` : "feedback";
      };

      const getClientId = () => {
        let clientId = localStorage.getItem(clientIdKey);

        if (!clientId) {
          clientId = crypto.randomUUID();
          localStorage.setItem(clientIdKey, clientId);
        }

        return clientId;
      };

      const validate = (value) => {
        if (!value) return "Enter a message.";
        if (value.length > 15) return "Keep it to 15 characters.";
        if (/\s/.test(value)) return "No spaces allowed.";
        return "";
      };

      input.addEventListener("input", () => {
        input.value = input.value.replace(/\s/g, "").slice(0, 15);
        setFeedback("");
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const value = input.value.trim();
        const issue = validate(value);

        if (issue) {
          setFeedback(issue, "is-error");
          return;
        }

        if (!client) {
          setFeedback("Supabase is not configured.", "is-error");
          return;
        }

        sendButton.disabled = true;
        setFeedback("Sending...", "is-muted");

        try {
          const { data, error } = await client.rpc("submit_drop", {
            p_message: value,
            p_client_id: getClientId(),
          });

          if (error) {
            setFeedback("Drop failed. Try again.", "is-error");
            return;
          }

          if (!data?.ok) {
            setFeedback(data?.message || "Hourly limit reached.", "is-error");
            return;
          }

          input.value = "";
          setFeedback(`Drop received. ${data.remaining} left this hour.`);
        } finally {
          sendButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
